name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: plugins/discord-threads
        run: bun install --no-summary

      - name: Type check
        working-directory: plugins/discord-threads
        run: bun build --no-bundle --target=bun server.ts > /dev/null

      - name: No console.log (use process.stderr.write)
        run: "! grep -n 'console\\.' plugins/discord-threads/server.ts"
